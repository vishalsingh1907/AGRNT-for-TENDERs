# ───────────────────────────────────────────────────────────
# Tender Monitoring Agent — Docker Compose
# ───────────────────────────────────────────────────────────

services:
  # ── Tender Monitoring Agent ──────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tender-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Use SQLite connection strings
      DATABASE_URL: sqlite+aiosqlite:///tender_agent.db
      DATABASE_URL_SYNC: sqlite:///tender_agent.db
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    volumes:
      # PDF downloads persist on host
      - ./downloads:/app/downloads
      # Sources config can be edited without rebuild
      - ./config/sources.yaml:/app/config/sources.yaml:ro
    command: ["python", "main.py", "--run-now"]
